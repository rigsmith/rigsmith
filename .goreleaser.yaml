# GoReleaser configuration for the rigsmith monorepo.
#
# This is a go.work workspace with multiple main packages living in separate
# modules:
#   - ./cli     -> binary `rig`     (dev launcher)
#   - ./shiprig -> binary `shiprig` (release tool)
#   - ./changerig (future)          -> binary `changerig` (changeset tool)
#
# Because the main packages are in different modules/directories, each binary
# gets its own build block with an explicit `dir`.
#
# rig stamps its version via the internal/cli seam (used by `rig --version`
# and `rig self-update`); shiprig has no version var yet.
#
# Run `goreleaser check` after editing to validate.
version: 2

project_name: rigsmith

builds:
  - id: rig
    dir: ./cli
    main: .
    binary: rig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/rigsmith/cli/internal/cli.version={{.Version}}

  - id: shiprig
    dir: ./shiprig
    main: .
    binary: shiprig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w  # add a version seam in shiprig/main when shiprig needs self-update

  - id: clauderig
    dir: ./clauderig
    main: .
    binary: clauderig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  # --- uncomment when the changerig binary lands ---
  # - id: changerig
  #   dir: ./changerig        # or ./shiprig if it ships from that module
  #   main: .
  #   binary: changerig
  #   env:
  #     - CGO_ENABLED=0
  #   goos:
  #     - linux
  #     - darwin
  #     - windows
  #   goarch:
  #     - amd64
  #     - arm64
  #   ldflags:
  #     - -s -w

archives:
  - id: rig
    ids:
      - rig
    name_template: "rig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: clauderig
    ids:
      - clauderig
    name_template: "clauderig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: shiprig
    ids:
      - shiprig
    name_template: "shiprig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  # --- uncomment alongside the changerig build above ---
  # - id: changerig
  #   ids:
  #     - changerig
  #   name_template: "changerig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  #   formats:
  #     - tar.gz
  #   format_overrides:
  #     - goos: windows
  #       formats:
  #         - zip

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

