# GoReleaser configuration for the rigsmith monorepo.
#
# This is a go.work workspace with multiple main packages living in separate
# modules:
#   - ./cli     -> binary `rig`    (dev launcher)
#   - ./release -> binary `relrig` (release tool)
#   - ./changerig (future)         -> binary `changerig` (changeset tool)
#
# Because the main packages are in different modules/directories, each binary
# gets its own build block with an explicit `dir`.
#
# Note: neither main package currently exposes a `version` variable, so we only
# strip symbols (-s -w) rather than stamping `-X main.version=...`. Once a
# `var version string` lands in a main package, add it back, e.g.:
#   ldflags: -s -w -X main.version={{.Version}}
#
# Run `goreleaser check` after editing to validate.
version: 2

project_name: rigsmith

builds:
  - id: rig
    dir: ./cli
    main: .
    binary: rig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      # - -s -w -X main.version={{.Version}}  # enable once cli main has a version var

  - id: relrig
    dir: ./release
    main: .
    binary: relrig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      # - -s -w -X main.version={{.Version}}  # enable once release main has a version var

  # --- uncomment when the changerig binary lands ---
  # - id: changerig
  #   dir: ./changerig        # or ./release if it ships from that module
  #   main: .
  #   binary: changerig
  #   env:
  #     - CGO_ENABLED=0
  #   goos:
  #     - linux
  #     - darwin
  #     - windows
  #   goarch:
  #     - amd64
  #     - arm64
  #   ldflags:
  #     - -s -w

archives:
  - id: rig
    ids:
      - rig
    name_template: "rig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: relrig
    ids:
      - relrig
    name_template: "relrig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  # --- uncomment alongside the changerig build above ---
  # - id: changerig
  #   ids:
  #     - changerig
  #   name_template: "changerig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  #   formats:
  #     - tar.gz
  #   format_overrides:
  #     - goos: windows
  #       formats:
  #         - zip

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

