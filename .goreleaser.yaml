# GoReleaser configuration for the rigsmith monorepo.
#
# Single Go module (github.com/rigsmith/rigsmith) with the main packages under
# cmd/:
#   - ./cmd/rig       -> binary `rig`       (dev launcher)
#   - ./cmd/shiprig   -> binary `shiprig`   (release tool)
#   - ./cmd/clauderig -> binary `clauderig` (Claude config sync)
#   - ./cmd/changerig -> binary `changerig` (changeset tool)
#
# Each binary gets its own build block with an explicit `main` path.
#
# rig stamps its version via the internal cli seam (used by `rig --version`
# and `rig self-update`); shiprig has no version var yet.
#
# Run `goreleaser check` after editing to validate.
version: 2

project_name: rigsmith

builds:
  - id: rig
    main: ./cmd/rig
    binary: rig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/rigsmith/rigsmith/internal/rig/cli.version={{.Version}}
    hooks:
      post:
        # Authenticode-sign the Windows .exe with Azure Trusted Signing
        # (no-op off Windows / until the signing secrets exist).
        - cmd: sh ./scripts/sign-windows.sh "{{ .Path }}" "{{ .Os }}"

  - id: shiprig
    main: ./cmd/shiprig
    binary: shiprig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w  # add a version seam in shiprig/main when shiprig needs self-update
    hooks:
      post:
        - cmd: sh ./scripts/sign-windows.sh "{{ .Path }}" "{{ .Os }}"

  - id: clauderig
    main: ./cmd/clauderig
    binary: clauderig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        - cmd: sh ./scripts/sign-windows.sh "{{ .Path }}" "{{ .Os }}"

  - id: changerig
    main: ./cmd/changerig
    binary: changerig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w  # no self-version var: changerig's `version` acts on the user's packages
    hooks:
      post:
        - cmd: sh ./scripts/sign-windows.sh "{{ .Path }}" "{{ .Os }}"

# Sign + notarize the macOS binaries with the Apple Developer ID, so they install
# and run with no Gatekeeper warning. quill (bundled with GoReleaser) does this on
# the Linux runner — no macOS runner needed. Auto-enables once MACOS_SIGN_P12 is
# present, so the config is safe to ship before the secrets are added; until then
# releases are unsigned (the cask's quarantine-strip keeps them runnable).
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - rig
        - shiprig
        - changerig
        - clauderig
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}" # base64 of the Developer ID Application .p12
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}" # base64 of the App Store Connect API .p8
        wait: true
        timeout: 20m

archives:
  - id: rig
    ids:
      - rig
    name_template: "rig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: clauderig
    ids:
      - clauderig
    name_template: "clauderig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: shiprig
    ids:
      - shiprig
    name_template: "shiprig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: changerig
    ids:
      - changerig
    name_template: "changerig_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

# Publish one Homebrew cask per tool to rigsmith/homebrew-tap, so
# `brew install --cask rigsmith/tap/<tool>` installs the prebuilt binary (no
# compile). GoReleaser v2 deprecated formulae (`brews`) in favour of casks; the
# cask also strips the macOS quarantine xattr so the unsigned binary runs without
# a Gatekeeper prompt. The default GITHUB_TOKEN can't push to another repo, so
# each cask authenticates with the HOMEBREW_TAP_TOKEN the release workflow passes.
homebrew_casks:
  - name: rig
    ids: [rig]
    repository:
      owner: rigsmith
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://rigsmith.dev"
    description: "Convention-first dev launcher across .NET, Node, Go, and Rust"
    # The binaries are unsigned, so strip the quarantine xattr Homebrew sets on a
    # cask download — otherwise macOS Gatekeeper blocks the first run.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/rig"]
          end

  - name: shiprig
    ids: [shiprig]
    repository:
      owner: rigsmith
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://rigsmith.dev"
    description: "Uniform changeset -> version -> publish, across every ecosystem"
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/shiprig"]
          end

  - name: changerig
    ids: [changerig]
    repository:
      owner: rigsmith
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://rigsmith.dev"
    description: "Changesets: capture intent, then version across every ecosystem"
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/changerig"]
          end

  - name: clauderig
    ids: [clauderig]
    repository:
      owner: rigsmith
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://rigsmith.dev"
    description: "Sync your Claude Code setup across machines, path-correct on restore"
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/clauderig"]
          end

release:
  github:
    owner: rigsmith
    name: rigsmith
