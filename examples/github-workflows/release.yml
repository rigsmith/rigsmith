# Copy to .github/workflows/release.yml in your repo.
#
# The release loop: on every push to main, if changesets are pending it opens or
# updates a "Version Packages" PR; once that PR is merged (no changesets left) it
# publishes. shiprig is installed automatically by the action.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # push the release branch + tags
  pull-requests: write  # open/update the Version Packages PR
  id-token: write       # npm OIDC trusted publishing (tokenless + provenance)

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags + full history for status --since / publish

      # For npm OIDC trusted publishing: one-time, add this workflow as a Trusted
      # Publisher on npmjs.com (Package → Settings → Trusted Publisher). Then no
      # NPM_TOKEN is needed — shiprig mints a short-lived token per publish and
      # npm attaches provenance automatically. registry-url makes npm publish to
      # the public registry.
      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      # Only needed if you pin shiprigVersion to `main`/a branch (source fallback).
      # - uses: actions/setup-go@v5
      #   with: { go-version-file: go.mod }

      - name: Release
        id: release
        uses: rigsmith/rigsmith/.github/actions/release@main
        with:
          version: shiprig version
          publish: shiprig publish --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}  # not needed with OIDC trusted publishing

      - name: Summary
        if: always()
        run: |
          echo "hasChangesets=${{ steps.release.outputs.hasChangesets }}"
          echo "published=${{ steps.release.outputs.published }}"
          echo "publishedPackages=${{ steps.release.outputs.publishedPackages }}"
          echo "pullRequestNumber=${{ steps.release.outputs.pullRequestNumber }}"
