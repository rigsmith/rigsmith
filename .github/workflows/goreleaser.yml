# Build and publish the four CLI binaries on a version tag.
#
# The release flow is two moments:
#   1. `shiprig version` bumps versions + writes changelogs; you commit, push, and
#      push a `vX.Y.Z` tag.
#   2. This workflow fires on that tag, runs GoReleaser, and creates the GitHub
#      Release with the cross-platform archives + checksums.
#
# scripts/install.sh (the `curl | sh` installer) downloads exactly the archives
# GoReleaser produces here (rig_<version>_<os>_<arch>.tar.gz). Uses the built-in
# GITHUB_TOKEN — no extra secret needed.
#
# Run it manually (Actions → Release binaries → Run workflow) for a dry run: it
# builds + signs everything with the real secrets but publishes nothing (no
# GitHub release, no tap push), and uploads the signed artifacts to inspect.
name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # manual dry run — build + sign, publish nothing

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser's git changelog is complete

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The gitrepo tests need a git identity + a `main` default branch, same as
      # ci.yml. Without this the temp repos default to `master` and the
      # main-based fetch/merge tests fail.
      - name: Configure git for tests
        run: |
          git config --global user.email ci@rigsmith.test
          git config --global user.name rigsmith-ci
          git config --global init.defaultBranch main

      # CI runs on main/PRs but not on tags, so gate the release on the tests
      # passing at the exact tagged commit — never publish binaries that fail.
      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      # jsign signs the Windows .exe with Azure Trusted Signing during the build
      # (see scripts/sign-windows.sh); it's a Java jar and needs a JRE.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Fetch jsign
        run: |
          curl -fsSL -o /tmp/jsign.jar \
            https://github.com/ebourg/jsign/releases/download/7.4/jsign-7.4.jar
          echo "JSIGN_JAR=/tmp/jsign.jar" >> "$GITHUB_ENV"

      # Node builds the npm binary-wrapper packages; registry-url wires npm auth.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # A manual run is a snapshot: it builds + signs but skips every publish
          # (no GitHub release, tap push, or npm). A tag does the real release.
          args: >-
            ${{ github.event_name == 'workflow_dispatch'
                && 'release --snapshot --clean'
                || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo token so GoReleaser can commit the casks to
          # rigsmith/homebrew-tap (the default GITHUB_TOKEN can't reach it).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # macOS sign + notarize (Apple Developer ID). Notarization auto-enables
          # once MACOS_SIGN_P12 is set; absent these, releases are unsigned.
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          # Windows Authenticode via Azure Trusted Signing (jsign). Signing
          # auto-enables once TRUSTED_SIGNING_ACCOUNT is set; absent these, the
          # Windows binaries ship unsigned.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_PROFILE }}

      # Build the npm binary-wrapper packages from dist/ (the prebuilt — and on a
      # tag, signed — binaries). A tag publishes them to npm; a manual dry run
      # validates packaging with `npm publish --dry-run` (packs each, no upload).
      - name: npm wrapper packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/npm/build-packages.mjs --dry-publish
          else
            node scripts/npm/build-packages.mjs --publish
          fi

      # Dry run only: hand back the built + signed artifacts to inspect locally
      # (codesign --verify / spctl on the mac binaries, the casks, checksums).
      # Nothing was published.
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: dryrun-dist
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/homebrew/Casks/*.rb
            npm/dist/**/package.json
          retention-days: 7
