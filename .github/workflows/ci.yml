name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # The parity/cmdtest harnesses create real git repos; give git an identity
      # and quiet the default-branch hint on every runner.
      - name: Configure git for tests
        run: |
          git config --global user.email ci@rigsmith.test
          git config --global user.name rigsmith-ci
          git config --global init.defaultBranch main

      - name: Test
        run: go test ./... -count=1

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      # Full history so the scan covers every commit, not just the tip.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan full history
        run: gitleaks git --no-banner -v -c .gitleaks.toml

  lint:
    name: vet + gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt needed on:" && echo "$out" && exit 1
          fi
